name: SafePay CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Node.js Unit Testing & Code Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Lambda Test Suite
        run: npm test

  terraform-verify:
    name: Terraform Validation & Dry-Run
    runs-on: ubuntu-latest
    needs: test-and-lint
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: 'us-east-1'
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup HashiCorp Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform

      - name: Terraform Initialization
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Syntax Validation
        run: terraform validate
        working-directory: ./terraform

      - name: Terraform Resource Planning (Dry-Run)
        run: terraform plan -no-color -input=false
        working-directory: ./terraform
        if: github.event_name == 'pull_request'

      - name: Terraform Resource Deployment (Apply)
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
